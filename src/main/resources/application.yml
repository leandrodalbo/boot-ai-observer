# Internal application.yml for the starter's own tests and example runs.
# This file is NOT loaded by apps that consume this starter as a dependency.
# It serves as the canonical reference for all ai.observer.* configuration options.

spring:
  application:
    name: boot-ai-observer

# ---------------------------------------------------------------------------
# AI Observer — full configuration reference
# ---------------------------------------------------------------------------
ai:
  observer:

    # Set to false to disable AI Observer entirely without removing the dependency.
    # Useful for CI pipelines or environments where AI analysis is not wanted.
    enabled: true

    # Required. The AI provider to use. The starter will not start if missing or invalid.
    # Accepted values: claude, openai, copilot
    ai-provider: claude

    # Required. Your API key for the chosen provider.
    # Always inject via environment variable — never hardcode in source.
    #
    #   claude  → ANTHROPIC_API_KEY
    #   openai  → OPENAI_API_KEY
    #   copilot → GITHUB_TOKEN
    ai-api-key: ${AI_API_KEY:}

    # Optional. Override the model. Each provider has a sensible default:
    #   claude  → claude-haiku-4-5-20251001
    #   openai  → gpt-4o-mini
    #   copilot → gpt-4o
    # ai-model: claude-sonnet-4-6

    # Optional. Override the API endpoint URL.
    # Use for proxies, corporate gateways, or self-hosted instances.
    # ai-api-url: https://api.anthropic.com/v1/messages

    # Optional. Override the API version header.
    # Each provider has a built-in default — only change if you need to pin.
    #   claude  → anthropic-version: 2023-06-01
    #   copilot → api-version: 2024-10-01-preview
    # ai-api-version: 2023-06-01

    # Max tokens allowed in the AI response.
    # 1024 is sufficient for a JSON array of insights.
    max-tokens: 1024

    # How often to run scheduled analysis, in seconds.
    # Default is 15 minutes — conservative to keep API costs low.
    # Thresholds below can still trigger earlier analysis between scheduled runs.
    interval-seconds: 900

    # -----------------------------------------------------------------------
    # Collectors — disable individual data sources if not needed.
    # All enabled by default. Disabling a collector also disables its
    # associated filter or AOP aspect — no wasted overhead.
    # -----------------------------------------------------------------------
    collectors:
      jvm-enabled: true       # heap, threads, CPU, GC via Micrometer
      latency-enabled: true   # per-endpoint latency via request filter
      errors-enabled: true    # exception tracking via AOP

    # -----------------------------------------------------------------------
    # Thresholds — crossing any of these triggers early analysis immediately,
    # without waiting for the next scheduled interval.
    # -----------------------------------------------------------------------
    thresholds:
      heap-usage-percent: 80.0    # % of max heap used
      thread-count: 200           # live thread count
      error-rate-percent: 5.0     # errors as % of total requests in the current window

    # -----------------------------------------------------------------------
    # Prompt — all fields are optional.
    #
    # The AI insight JSON contract (enforced by the built-in system prompt):
    #   [
    #     {
    #       "level":          "INFO" | "WARNING" | "CRITICAL",
    #       "message":        "Human-readable description of the finding",
    #       "recommendation": "Concrete action to take"
    #     }
    #   ]
    # The provider returns [] when everything looks healthy.
    #
    # Most users only need extra-context. Set it once and every future insight
    # will be specific to your application instead of generic JVM advice.
    # -----------------------------------------------------------------------
    prompt:

      # Optional. Prepended to the system prompt before the built-in response format.
      # Use to tell the AI what kind of application it is monitoring.
      # intro: "You are monitoring a high-frequency trading system. Prioritize latency above all else."

      # Optional. Appended to the user message after the snapshot JSON.
      # Use to highlight what matters most for your specific application.
      # extra-context: |
      #   This is a payment processing service handling ~500 req/min.
      #   It uses PostgreSQL and Redis. Peak traffic is 9am–6pm UTC.
      #   Downtime during business hours is critical — flag anything latency-related.
