# Internal application.yml for the starter's own tests and example runs.
# This file is NOT loaded by apps that consume this starter as a dependency.
# It serves as the canonical reference for all ai.observer.* configuration options.

spring:
  application:
    name: boot-ai-observer

# ---------------------------------------------------------------------------
# AI Observer — full configuration reference
# ---------------------------------------------------------------------------
ai:
  observer:

    # Required. Set via environment variable — never hardcode.
    anthropic-api-key: ${ANTHROPIC_API_KEY:}

    # Required. No default — you must choose a model explicitly.
    # claude-haiku-4-5-20251001   cheapest and fast, good for routine monitoring
    # claude-sonnet-4-6           more capable, better for complex correlations
    model: claude-haiku-4-5-20251001

    # Set to false to disable without removing the dependency (e.g. in CI pipelines).
    enabled: true

    # Max tokens in the AI response. 1024 is plenty for a JSON insight array.
    max-tokens: 1024

    # How often to run scheduled analysis, in seconds.
    # Default is 15 minutes — conservative to keep API costs low.
    # Thresholds below can still trigger earlier analysis between scheduled runs.
    interval-seconds: 900

    # -----------------------------------------------------------------------
    # Thresholds — crossing any of these triggers early analysis immediately,
    # without waiting for the next scheduled interval.
    # -----------------------------------------------------------------------
    thresholds:
      heap-usage-percent: 80.0    # % of max heap used
      thread-count: 200           # live thread count
      error-rate-percent: 5.0     # errors as % of total requests in the current window

    # -----------------------------------------------------------------------
    # Prompt — all fields are optional.
    # Unset fields fall back to the bundled defaults:
    #   ai-observer/default-system-prompt.txt
    #   ai-observer/default-user-template.txt
    #
    # Most users only need extra-context. Set it once and every future insight
    # will be specific to your application instead of generic JVM advice.
    # -----------------------------------------------------------------------
    prompt:

      # Describe your application. Injected into every AI call.
      # Leave empty if you don't need application-specific context.
      extra-context: ""

      # Example:
      # extra-context: |
      #   This is a payment processing service handling ~500 req/min.
      #   It uses PostgreSQL and Redis. Peak traffic is 9am–6pm UTC.
      #   Downtime during business hours is critical — flag anything latency-related.

      # Override the system prompt entirely. Only needed if the bundled default
      # does not fit your use case. See ai-observer/default-system-prompt.txt
      # for the exact text that ships with the starter.
      # system-prompt: |
      #   You are a JVM expert for a high-frequency trading system.
      #   Focus exclusively on latency outliers and GC pauses above 50ms.
      #   Return JSON only: [{"level":"...","message":"...","recommendation":"..."}]

      # Override the user message template. Use {snapshot} where the JSON
      # snapshot should be inserted. See ai-observer/default-user-template.txt
      # for the exact text that ships with the starter.
      # user-template: |
      #   Current state of our checkout service:
      #   {snapshot}
      #   Flag anything that could cause checkout failures or increased error rates.
